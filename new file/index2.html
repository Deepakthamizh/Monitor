//when a user clicks a button the text from that button is shown in the h1 tag located above it. 

<h1 id="h1">Name</h1>

<button id="john" onclick="changename()">John</button>
<button id="praveen" onclick="changename1()">Praveen</button>
<button id="karthi" onclick="changename2()">Karthi</button>

<button onclick="changename(event)">John</button>
<button onclick="changename1(event)">Praveen</button>
<button onclick="changename2(event)">Karthi</button>



<script>
    var h1=document.getElementById("h1");

    function changename() {
      h1.textContent="John";
    }

    function changename1() {
      h1.textContent="Praveen";
    }

    function changename2() {
      h1.textContent="Karthi";
    }

    function changename3(event) {
      h1.textContent=event.target.textContent;

    }
</script>

</script>
