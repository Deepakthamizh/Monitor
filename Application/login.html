<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor-Login</title>

  <style>
      @font-face {
      font-family: "Zoho Puvi Light";
      src: url("fonts/Zoho Puvi Light.ttf");
    }

    .designRed {
      background-color: rgb(228 37 39);
      width: 180px;
      height: 100px;
      border-radius: 10px;
      position: relative;
      bottom: -200px;
      right: -30px; 
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .loginImageRed {
      width: 180px;
      height: auto;
      position: relative;
      bottom: -10px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
    }

    .designGreen {
      background-color: rgb(8 153 73);
      width: 180px;
      height: 100px;
      border-radius: 10px;
      position: relative;
      bottom: -200px;
      right: -240px;
    }

    .loginImageGreen {
      width: 180px;
      height: auto;
      position: relative;
      bottom: -10px;
      border-radius: 10px;
    }

    .designBlue {
      background-color: rgb(34 109 180);
      width: 180px;
      height: 100px;
      border-radius: 10px;
      position: relative;
      bottom: 0px;
      right: -450px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .loginImageBlue {
      width: 180px;
      height: none;
      position: relative;
      bottom: -10px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
    }

    .designYellow {
      background-color: rgb(249 178 29);
      width: 180px;
      height: 100px;
      border-radius: 10px;
      position: relative;
      bottom: 0px;
      right: -660px;
    }

    .loginImageYellow {
      width: 180px;
      height: auto;
      position: relative;
      bottom: -10px;
      border-radius: 10px;
    }

    .form {
      width: 400px;
    }

    .loginBox {
      background-color: RGB(250 250 250);
      border-radius: 20px;
      padding: 20px;
      padding-left: 30px;
      height: 410px;
      font-family: "Zoho Puvi Light";
      position: relative;
      right: -910px;
      top: -250px;
      width: 400px;
    }

    .emailBox {
      font-family: "Zoho Puvi Light";
      height: 30px;
      width: 300px;
      border-radius: 5px;
      padding: 5px;
      border: solid;
      border-color: rgb(197, 197, 197);
    }

    .passwordBox {
      font-family: "Zoho Puvi Light";
      height: 30px;
      width: 300px;
      border-radius: 5px;
      padding: 5px;
      border: solid;
      border-color: rgb(197, 197, 197);
    }

    .submitButton {
      font-family: "Zoho Puvi Light";
      height: 30px;
      width: 80px;
      position: relative;
      cursor: pointer;
    }

    .signUp {
      position: relative;
      top: 10px;
      font-size: 14px;
    }

    .lineBreak {
      position: relative;
      top: 50px;
      width: 278px;
      right: 30px;
      color: rgb(241, 241, 241);
    }

    .logoRow {
      display: flex;
      gap: 15px; /* space between buttons */
      position: relative;
      top: 50px;
      right: 10px; /* adjust as needed */
      align-items: center;
    }

    .googleLogo,
    .microsoftLogo,
    .githubLogo {
      background-color: rgb(250 250 250);
      border: 0.5px solid transparent;
      position: relative;
      cursor: pointer;
      width: 45px;
      height: 45px;
      border-radius: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease-in-out;
    }

    .googleLogo:hover,
    .microsoftLogo:hover,
    .githubLogo:hover {
      background-color: white;
      border-color: rgb(249 178 29);
      transform: scale(1.1); /* subtle zoom */
    }

    .googleLogo img {
      width: 35px;
    }

    .microsoftLogo img {
      width: 20px;
    }

    .githubLogo img {
      width: 25px;
    }

    .inbetweenText {
      position: relative;
      top: 29px;
      right: 2px;
      background-color: RGB(250 250 250);
      color: RGB(50 50 50);
      font-family: "Zoho Puvi Light";
      font-size: 14px;
    }
  </style>

</head>
<body>

  <div class="designRed">
    <img src="referenceImages/monitor-todo-app.png" class="loginImageRed">
  </div>

  <div class="designGreen">
    <img src="referenceImages/Monitor-login-image.png" class="loginImageGreen">
  </div>

  <div class="designBlue">
    <img src="referenceImages/marking-todo-app.png" class="loginImageBlue">
  </div>

  <div class="designYellow">
    <img src="referenceImages/last-todo-app.png" class="loginImageYellow">
  </div>

  <div class="loginBox" id="loginBox">
    <h2 class="login">
      Login
    </h2>

      <form onsubmit="login(event)" class="form">

        <input class="emailBox" id="emailBox" type="text" name="name" placeholder="Enter your email"><br><br>
        <input class="passwordBox" id="passwordBox" type="password" name="password" placeholder="Password"><br><br>
        <button class="submitButton" id="submitButton" disabled>Submit</button>

        <p id="invalidMessage" style="color: red;"></p>
      </form>
      <a href="./signup.html" class="signUp">Don't have an account? Create one</a>

      <hr class="lineBreak" ><span class="inbetweenText">&nbsp;or signin using&nbsp;&nbsp;</span></hr>

      <div class="logoRow">
        <a href="/auth/google">
          <button class="googleLogo">
            <img src="referenceImages/google-logo.webp">
          </button>
        </a>

        <a href="/auth/microsoft">
          <button class="microsoftLogo">
            <img src="referenceImages/microsoft logo.png">
          </button>
        </a>

        <a href="/auth/github">
          <button class="githubLogo">
            <img src="/referenceImages/Octicons-mark-github.svg">
          </button>
        </a>
      </div>

  </div>

  <script>

    function login(event){

      event.preventDefault(); 

      const name = document.getElementById("emailBox").value;
      const password = document.getElementById("passwordBox").value;
      
      fetch("/login", {
        method: "POST", 
        headers: {"Content-Type": "application/json"}, 
        body: JSON.stringify({name, password})
      })

      .then(res => res.json())
      .then(data => {
        if(data.success) {
          document.cookie=`username=${data.name}; path=/`; //stores the user name or email as a cookie, path=/ avails the cookie in all the pages. 
          window.location.href = "/home";
        } else {
          document.getElementById("invalidMessage").textContent = data.message;
        }
      })
      .catch(err => {
        console.error("Login failed:", err);
        document.getElementById("loginMessage").textContent = "Something went wrong!";
      });
    }

    window.onload = function() {
      const emailBox = document.getElementById("emailBox");
      const passwordBox = document.getElementById("passwordBox");
      const submitButton = document.getElementById("submitButton");

      function checkInputs() {
        if (emailBox.value.trim() !== "" && passwordBox.value.trim() !== "") {
          submitButton.disabled = false;
        } else {
          submitButton.disabled = true;
        }
      }

      // Run checkInputs every time the user types in either field
      emailBox.addEventListener("input", checkInputs);
      passwordBox.addEventListener("input", checkInputs);
    };

  </script>
  
</body>
</html>
